<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboards | MiniGamePlanet</title>
  <meta name="description" content="See who's on top! View the MiniGamePlanet leaderboards — top players, highest scores, poker chip leaders, and more.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://minigameplanet.com/leaderboard">
  <link rel="icon" href="/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: { extend: { fontFamily: { 'sans': ['"Space Grotesk"', 'system-ui', 'sans-serif'], 'mono': ['"DM Mono"', 'monospace'] } } }
  }
  </script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('consent', 'default', { 'analytics_storage':'denied','ad_storage':'denied','ad_user_data':'denied','ad_personalization':'denied','wait_for_update':500 });
  gtag('config', 'G-XXXXXXXXXX');
  </script>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Leaderboards | MiniGamePlanet">
  <meta property="og:description" content="See who's on top! View the MiniGamePlanet leaderboards.">
  <meta property="og:url" content="https://minigameplanet.com/leaderboard">
  <meta property="og:image" content="https://minigameplanet.com/images/logo.png">
  <style>
    body { font-family: 'Space Grotesk', system-ui, sans-serif; margin: 0; background: #0F172A; color: #fff; overflow-x: hidden; }
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; top: -20px; z-index: 9999;
      animation: confettiFall linear forwards; pointer-events: none;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
    }
    .trophy-bounce { animation: trophyBounce 2s ease-in-out infinite; }
    @keyframes trophyBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-12px) scale(1.1); }
    }
    .trophy-spin { animation: trophySpin 4s linear infinite; }
    @keyframes trophySpin {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    .podium-rise { animation: podiumRise 0.8s ease-out forwards; opacity: 0; transform: translateY(40px); }
    @keyframes podiumRise {
      to { opacity: 1; transform: translateY(0); }
    }
    .shimmer {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 2s ease-in-out infinite;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .glow-gold { text-shadow: 0 0 20px rgba(245,158,11,0.6), 0 0 40px rgba(245,158,11,0.3); }
    .glow-silver { text-shadow: 0 0 20px rgba(148,163,184,0.6), 0 0 40px rgba(148,163,184,0.3); }
    .glow-bronze { text-shadow: 0 0 20px rgba(180,83,9,0.6), 0 0 40px rgba(180,83,9,0.3); }
    .tab-btn { padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 15px; border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .tab-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .tab-btn.active { background: linear-gradient(135deg, #F59E0B, #D97706); color: #fff; border-color: #F59E0B; box-shadow: 0 4px 20px rgba(245,158,11,0.4); }
    .lb-row { display: grid; grid-template-columns: 60px 1fr 120px; align-items: center; padding: 14px 20px; border-radius: 12px; transition: all 0.15s; }
    .lb-row:hover { background: rgba(255,255,255,0.05); transform: translateX(4px); }
    .lb-row:nth-child(even) { background: rgba(255,255,255,0.02); }
    .lb-row:nth-child(even):hover { background: rgba(255,255,255,0.07); }
    .rank-num { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 18px; }
    .stat-val { font-family: 'DM Mono', monospace; font-weight: 600; text-align: right; }
  </style>
</head>
<body>
  <div id="nav-container"></div>

  <main style="max-width:900px;margin:0 auto;padding:24px 16px;">

    <!-- Hero -->
    <div style="text-align:center;padding:40px 0 20px;">
      <div style="display:flex;justify-content:center;gap:20px;margin-bottom:16px;">
        <span class="trophy-bounce" style="font-size:60px;animation-delay:0s;">🏆</span>
        <span class="trophy-spin" style="font-size:50px;perspective:200px;display:inline-block;">🥇</span>
        <span class="trophy-bounce" style="font-size:60px;animation-delay:0.3s;">🏆</span>
      </div>
      <h1 style="font-size:clamp(32px,6vw,48px);font-weight:700;margin:0 0 8px;background:linear-gradient(135deg,#F59E0B,#FBBF24,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
        Leaderboards
      </h1>
      <p style="color:rgba(255,255,255,0.6);font-size:16px;margin:0;">The best of the best. Do you have what it takes?</p>
    </div>

    <!-- Podium -->
    <div id="podium" style="display:flex;justify-content:center;align-items:flex-end;gap:12px;margin:32px auto 40px;max-width:500px;min-height:240px;">
      <div id="pod-2" class="podium-rise" style="animation-delay:0.3s;text-align:center;flex:1;">
        <div style="font-size:36px;margin-bottom:8px;">🥈</div>
        <div id="pod-2-name" style="font-weight:700;font-size:15px;color:#94A3B8;margin-bottom:8px;">—</div>
        <div style="background:linear-gradient(180deg,#94A3B8 0%,#64748B 100%);border-radius:12px 12px 0 0;height:100px;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:28px;font-weight:900;color:rgba(255,255,255,0.8);">2</span>
        </div>
      </div>
      <div id="pod-1" class="podium-rise" style="animation-delay:0.1s;text-align:center;flex:1;">
        <div class="trophy-bounce" style="font-size:48px;margin-bottom:8px;">👑</div>
        <div id="pod-1-name" style="font-weight:700;font-size:17px;color:#FBBF24;margin-bottom:8px;">—</div>
        <div style="background:linear-gradient(180deg,#F59E0B 0%,#D97706 100%);border-radius:12px 12px 0 0;height:140px;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:36px;font-weight:900;color:rgba(255,255,255,0.9);">1</span>
        </div>
      </div>
      <div id="pod-3" class="podium-rise" style="animation-delay:0.5s;text-align:center;flex:1;">
        <div style="font-size:32px;margin-bottom:8px;">🥉</div>
        <div id="pod-3-name" style="font-weight:700;font-size:14px;color:#B45309;margin-bottom:8px;">—</div>
        <div style="background:linear-gradient(180deg,#B45309 0%,#92400E 100%);border-radius:12px 12px 0 0;height:70px;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:24px;font-weight:900;color:rgba(255,255,255,0.7);">3</span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:24px;">
      <button class="tab-btn active" data-tab="active">🎮 Most Active</button>
      <button class="tab-btn" data-tab="rated">⚔️ Highest Rated</button>
      <button class="tab-btn" data-tab="online">🌐 Online Wins</button>
      <button class="tab-btn" data-tab="poker">🃏 Poker</button>
    </div>

    <!-- Leaderboard List -->
    <div id="lb-container" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;">
      <div id="lb-header" style="display:grid;grid-template-columns:60px 1fr 120px;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);">
        <span>Rank</span><span>Player</span><span id="lb-stat-label" style="text-align:right;">Games</span>
      </div>
      <div id="lb-list" style="min-height:200px;padding:8px 0;">
        <div style="text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);">Loading leaderboard...</div>
      </div>
    </div>

    <div style="text-align:center;margin-top:32px;">
      <a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;border-radius:12px;font-weight:700;font-size:16px;text-decoration:none;transition:transform 0.15s,box-shadow 0.15s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(245,158,11,0.4)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
        🎮 Play Games & Climb the Ranks
      </a>
    </div>
  </main>

  <div id="footer-container"></div>

  <script type="module">
  import { renderNav, renderFooter } from '/js/shared.js';
  import { initConsent } from '/js/consent.js';
  import { getGlobalLeaderboard } from '/js/player.js';

  renderNav();
  renderFooter();
  initConsent();

  // Confetti burst on page load
  function launchConfetti() {
    const colors = ['#F59E0B','#FBBF24','#EF4444','#3B82F6','#10B981','#8B5CF6','#EC4899','#06B6D4'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const left = Math.random() * 100;
      const size = 6 + Math.random() * 8;
      const dur = 2 + Math.random() * 3;
      const delay = Math.random() * 1.5;
      const shape = Math.random() > 0.5 ? '50%' : '0';
      piece.style.cssText = `left:${left}%;width:${size}px;height:${size}px;background:${color};border-radius:${shape};animation-duration:${dur}s;animation-delay:${delay}s;`;
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), (dur + delay) * 1000 + 200);
    }
  }
  launchConfetti();

  const tabs = document.querySelectorAll('.tab-btn');
  const lbList = document.getElementById('lb-list');
  const statLabel = document.getElementById('lb-stat-label');
  let currentTab = 'active';

  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      loadLeaderboard();
    });
  });

  function rankIcon(i) {
    if (i === 0) return '<span style="font-size:22px;">🥇</span>';
    if (i === 1) return '<span style="font-size:22px;">🥈</span>';
    if (i === 2) return '<span style="font-size:22px;">🥉</span>';
    return `<span class="rank-num" style="color:rgba(255,255,255,0.5);">${i + 1}</span>`;
  }

  function nameStyle(i) {
    if (i === 0) return 'color:#FBBF24;font-weight:700;font-size:16px;';
    if (i === 1) return 'color:#94A3B8;font-weight:700;font-size:15px;';
    if (i === 2) return 'color:#B45309;font-weight:700;font-size:15px;';
    return 'color:rgba(255,255,255,0.8);font-weight:600;font-size:14px;';
  }

  async function loadLeaderboard() {
    lbList.innerHTML = '<div style="text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3);">Loading...</div>';

    try {
      const data = await getGlobalLeaderboard();
      const entries = data.entries || [];

      if (entries.length === 0) {
        lbList.innerHTML = '<div style="text-align:center;padding:60px 20px;"><div style="font-size:48px;margin-bottom:12px;">🏜️</div><div style="color:rgba(255,255,255,0.4);font-size:15px;">No players yet. Be the first!</div></div>';
        return;
      }

      let sorted = [...entries];
      let statKey = 'totalPlayed';
      let statSuffix = ' games';

      if (currentTab === 'rated') {
        sorted.sort((a, b) => (b.eloRating || 1000) - (a.eloRating || 1000));
        statKey = 'eloRating';
        statSuffix = ' Elo';
        statLabel.textContent = 'Rating';
      } else if (currentTab === 'online') {
        sorted.sort((a, b) => (b.onlineWins || 0) - (a.onlineWins || 0));
        statKey = 'onlineWins';
        statSuffix = ' wins';
        statLabel.textContent = 'Online Wins';
      } else if (currentTab === 'poker') {
        sorted.sort((a, b) => (b.chipBalance || 0) - (a.chipBalance || 0));
        statKey = 'chipBalance';
        statSuffix = ' chips';
        statLabel.textContent = 'Bankroll';
      } else {
        sorted.sort((a, b) => (b.totalPlayed || 0) - (a.totalPlayed || 0));
        statLabel.textContent = 'Games Played';
      }

      sorted = sorted.slice(0, 50);

      // Update podium
      for (let i = 0; i < 3; i++) {
        const el = document.getElementById(`pod-${i + 1}-name`);
        if (el) el.textContent = sorted[i] ? sorted[i].name : '—';
      }

      lbList.innerHTML = sorted.map((p, i) => {
        const val = p[statKey] || (statKey === 'eloRating' ? 1000 : 0);
        const displayVal = statKey === 'chipBalance' ? val.toLocaleString() : val;
        return `<div class="lb-row" style="animation:podiumRise 0.4s ease-out ${i * 0.03}s forwards;opacity:0;">
          <div>${rankIcon(i)}</div>
          <div style="${nameStyle(i)}">${p.name}${p.favoriteGame ? ` <span style="font-size:11px;color:rgba(255,255,255,0.3);font-weight:400;">• ${p.favoriteGame}</span>` : ''}</div>
          <div class="stat-val" style="color:${i < 3 ? '#FBBF24' : 'rgba(255,255,255,0.5)'};">${displayVal}${statSuffix}</div>
        </div>`;
      }).join('');

    } catch (err) {
      lbList.innerHTML = '<div style="text-align:center;padding:60px 20px;"><div style="font-size:48px;margin-bottom:12px;">😵</div><div style="color:rgba(255,255,255,0.4);font-size:15px;">Could not load leaderboard. Play some games first!</div></div>';
    }
  }

  loadLeaderboard();
  </script>
</body>
</html>
