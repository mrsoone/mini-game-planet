name = "minigameplanet-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "PLAYERS"
id = "YOUR_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "minigameplanet"
database_id = "YOUR_D1_DATABASE_ID"

[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" },
  { name = "GAME_LOBBY", class_name = "GameLobby" }
]

[[migrations]]
tag = "v1"
new_classes = ["GameRoom", "GameLobby"]
